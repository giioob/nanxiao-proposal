<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>南消培训 · 视频脚本库</title>
<style>
:root{
  --primary:#1E40AF;--primary-light:#3B82F6;--primary-bg:#EFF6FF;
  --accent:#F97316;--accent-bg:#FFF7ED;
  --bg:#FFFFFF;--bg-alt:#F8FAFC;
  --text:#1E293B;--text-muted:#64748B;--text-light:#94A3B8;--border:#E2E8F0;
  --success:#10B981;--success-bg:#ECFDF5;
  --warning:#F59E0B;--warning-bg:#FFFBEB;
  --danger:#EF4444;--danger-bg:#FEF2F2;
  --purple:#8B5CF6;--purple-bg:#F5F3FF;
  --radius:14px;--radius-sm:10px;
  --shadow:0 2px 12px rgba(30,64,175,.06);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg-alt);line-height:1.7;-webkit-font-smoothing:antialiased}

/* Nav */
.nav{position:sticky;top:0;height:56px;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);z-index:100;display:flex;align-items:center;padding:0 20px}
.nav-inner{max-width:960px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.nav-brand{font-size:15px;font-weight:800;color:var(--primary);white-space:nowrap}
.nav-brand span{color:var(--accent)}
.nav-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg-alt);border-color:var(--primary-light)}
.btn-primary{background:var(--primary);color:white;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-light)}
.btn-success{background:var(--success);color:white;border-color:var(--success)}
.btn-accent{background:var(--accent);color:white;border-color:var(--accent)}

/* Dashboard */
.container{max-width:960px;margin:0 auto;padding:20px}
@media(max-width:768px){.container{padding:16px 12px}}

.dashboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:24px}
.dash-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center;cursor:pointer;transition:all .15s}
.dash-card:hover{border-color:var(--primary-light);transform:translateY(-1px)}
.dash-card.active{border-color:var(--primary);background:var(--primary-bg)}
.dash-val{font-size:22px;font-weight:800;letter-spacing:-1px}
.dash-label{font-size:10px;color:var(--text-muted);margin-top:2px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.c-blue{color:var(--primary)}.c-green{color:var(--success)}.c-orange{color:var(--accent)}.c-red{color:var(--danger)}.c-purple{color:var(--purple)}

/* Filters */
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.filter-btn{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text-muted);transition:all .15s}
.filter-btn:hover{border-color:var(--primary-light);color:var(--primary)}
.filter-btn.active{background:var(--primary);color:white;border-color:var(--primary)}
.search-box{padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;width:200px;outline:none}
.search-box:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px var(--primary-bg)}

/* Script Card */
.script{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:20px;box-shadow:var(--shadow);overflow:hidden;transition:border-color .2s}
.script.status-approved{border-left:4px solid var(--success)}
.script.status-rejected{border-left:4px solid var(--danger)}
.script.status-revised{border-left:4px solid var(--warning)}
.script-header{padding:20px 24px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;user-select:none}
.script-header:hover{background:var(--bg-alt)}
.script-left{flex:1;min-width:0}
.script-num{display:inline-flex;width:30px;height:30px;background:var(--primary-bg);color:var(--primary);border-radius:8px;align-items:center;justify-content:center;font-size:13px;font-weight:800;margin-right:10px;flex-shrink:0}
.script-num.cat-a{background:var(--primary-bg);color:var(--primary)}
.script-num.cat-b{background:var(--accent-bg);color:var(--accent)}
.script-num.cat-c{background:var(--success-bg);color:var(--success)}
.script-num.cat-d{background:var(--purple-bg);color:var(--purple)}
.script-num.cat-e{background:var(--warning-bg);color:var(--warning)}
.script-title-text{font-size:16px;font-weight:700;display:inline}
.script-tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.3px}
.tag-cat{background:var(--primary-bg);color:var(--primary)}
.tag-dur{background:var(--bg-alt);color:var(--text-muted)}
.tag-status{padding:3px 10px}
.tag-draft{background:var(--bg-alt);color:var(--text-muted)}
.tag-approved{background:var(--success-bg);color:var(--success)}
.tag-rejected{background:var(--danger-bg);color:var(--danger)}
.tag-revised{background:var(--warning-bg);color:var(--warning)}
.script-toggle{font-size:18px;color:var(--text-light);transition:transform .2s;flex-shrink:0;margin-top:4px}
.script.open .script-toggle{transform:rotate(180deg)}

.script-body{display:none;padding:0 24px 24px;border-top:1px solid var(--border)}
.script.open .script-body{display:block}

.section-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.section-label:first-child{margin-top:16px}

.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin:10px 0}
.meta-item{background:var(--bg-alt);border-radius:8px;padding:10px 14px;font-size:12px}
.meta-item strong{display:block;font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}

.hook-box{background:var(--accent-bg);border-left:3px solid var(--accent);padding:14px 18px;border-radius:0 8px 8px 0;font-size:13px;font-weight:500;margin:10px 0;line-height:1.8}

.script-text{background:var(--bg-alt);border-radius:8px;padding:18px;font-size:13px;line-height:2;margin:10px 0;white-space:pre-wrap;border:1px solid var(--border)}

.points-list{padding-left:18px;font-size:13px;line-height:2}
.points-list li{margin-bottom:4px}

.publish-box{background:var(--primary-bg);border-radius:8px;padding:14px 18px;font-size:12px;line-height:1.8;margin:10px 0}

/* Review Panel */
.review-panel{margin-top:20px;padding-top:16px;border-top:2px solid var(--border)}
.review-title{font-size:12px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.review-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.review-btn{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--bg);transition:all .15s}
.review-btn:hover{transform:translateY(-1px)}
.review-btn.approve{border-color:var(--success);color:var(--success)}
.review-btn.approve:hover,.review-btn.approve.active{background:var(--success);color:white}
.review-btn.reject{border-color:var(--danger);color:var(--danger)}
.review-btn.reject:hover,.review-btn.reject.active{background:var(--danger);color:white}
.review-btn.revise{border-color:var(--warning);color:var(--warning)}
.review-btn.revise:hover,.review-btn.revise.active{background:var(--warning);color:white}

.comment-area{width:100%;min-height:80px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;resize:vertical;outline:none;margin-top:8px}
.comment-area:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px var(--primary-bg)}
.comment-area::placeholder{color:var(--text-light)}
.save-comment{margin-top:8px}

.comment-list{margin-top:12px}
.comment-item{background:var(--bg-alt);border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;position:relative}
.comment-item .comment-time{font-size:10px;color:var(--text-light);margin-bottom:4px}
.comment-item .comment-text{line-height:1.7}
.comment-delete{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--text-light);cursor:pointer;font-size:14px;padding:4px}
.comment-delete:hover{color:var(--danger)}

/* Print Styles */
@media print{
  .nav,.dashboard,.filters,.review-panel,.nav-actions,.script-toggle,.btn,.no-print{display:none!important}
  .script{break-inside:avoid;border:1px solid #ddd!important;margin-bottom:16px!important;border-left-width:1px!important}
  .script-body{display:block!important;border-top:1px solid #ddd!important}
  .script-header{cursor:default}
  body{background:white}
  .container{max-width:100%;padding:0}
  .script-text{background:#f5f5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .hook-box{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .tag{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}

.hidden{display:none!important}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:white;padding:10px 24px;border-radius:999px;font-size:13px;font-weight:600;z-index:200;animation:fadeInUp .3s ease}
@keyframes fadeInUp{from{opacity:0;transform:translateX(-50%) translateY(16px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-brand">Solo<span>OS</span> · 视频脚本库 <span style="font-weight:400;font-size:12px;color:var(--text-muted)">v1.0</span></div>
    <div class="nav-actions">
      <input type="text" class="search-box" id="searchBox" placeholder="搜索脚本..." oninput="filterScripts()">
      <button class="btn" onclick="expandAll()">全部展开</button>

</div>

<div class="container">

<!-- Dashboard -->
<div class="dashboard" id="dashboard">
  <div class="dash-card" onclick="filterByStatus('all')"><div class="dash-val c-blue" id="totalCount">20</div><div class="dash-label">全部脚本</div></div>

</div>

<!-- Filters -->
<div class="filters">
  <span class="filter-label">分类</span>
  <button class="filter-btn active" data-cat="all" onclick="filterByCat('all',this)">全部</button>

  <button class="filter-btn" data-cat="E" onclick="filterByCat('E',this)">转化逼单</button>
</div>

<!-- Scripts Container -->
<div id="scriptsContainer"></div>

</div>

<script>
const SCRIPTS = [
  {
    id:1, cat:"A", catName:"政策紧迫", duration:"45-60s", title:"10 月政策改革倒计时：现在不考，以后更难",
    hook:"你知道吗？今年 10 月，消防证的考试题库要大改。改完之后，通过率可能直接腰斩。",
    script:`【开头 — 紧迫感】
你知道吗？今年 10 月，国家要对消防设施操作员的考试进行政策性改革。

题库更新、考试标准变化、通过率可能直接下降。

【中间 — 算账】
现在考试，用的是现行题库，我们的通过率做到了 80%，全国领先。

但改革之后？没人知道新题库长什么样，所有人都要重新适应。

换句话说——现在是你拿证成本最低、通过率最高的窗口期。

【核心数据】
我们目前的综合通过率 80%，全国平均只有 30%。
盛宏石化 296 人团报，通过 285 人，通过率 96.3%。

这些数据，改革后还能不能保持？说实话，我们自己也没底。

【结尾 — 行动号召】
所以，如果你一直在犹豫要不要考，现在就是最好的时机。
评论区扣"报名"两个字，我发你详细资料和政策解读。

别等改革后再后悔。`,
    points:["强调 10 月改革窗口期","引用 80% vs 30% 通过率数据","盛宏石化 296 人案例","制造紧迫感驱动立即行动"],
    shooting:"室内口播，背景放消防设备或教室",
    personnel:"营销方向老师（由甲方安排）",
    publish:{platform:"抖音官号",time:"工作日 18:00-20:00",tags:"#消防证 #消防设施操作员 #政策改革 #考证",note:"评论区置顶报名引导链接"}
  },
  {
    id:2, cat:"E", catName:"转化逼单", duration:"50-70s", title:"算一笔账：花 2280 考个证，月薪能涨多少？",
    hook:"花 2280 块钱考一个证，值不值？我帮你算一笔账。",
    script:`【开头 — 算账引入】
花 2280 块钱考一个证，到底值不值？

别急，我帮你算一笔账。

【第一笔账 — 薪资回报】
考完消防设施操作员中级证——
在连云港，月薪 4000 到 6000。
去苏州、南京，月薪 7000 到 8000。
去上海，月薪 8000 起步。

2280 的培训投入，一个月的工资就赚回来了。

【第二笔账 — 对比竞品】
同样的证，去别的城市培训要多少钱？
市场均价 3280——比我们贵 1000 块。
去海南考？培训费 5000 + 机票食宿 8000，加起来一万三。

来我们这里，2280 全搞定。

【第三笔账 — 风险成本】
在别的机构，考不过钱就打水漂了。
在我们这里，按流程学习，两次不过全额退款。

你的风险？零。

【结尾】
2280 块，换一个月薪 6000+ 的稳定工作，你觉得值不值？
私信我，帮你做个学习规划。`,
    points:["薪资数据：连云港 4-6k / 苏南 7-8k / 上海 8k+","价格对比：2280 vs 市场 3280 vs 海南 13000+","零风险：两次不过全额退款","结尾引导私信"],
    shooting:"口播 + 画面叠加数字动画（薪资、价格对比）",
    personnel:"营销方向老师（由甲方安排）",
    publish:{platform:"抖音官号 + 视频号",time:"周末 10:00-12:00",tags:"#消防证 #考证 #涨薪 #职业规划",note:"评论区准备薪资数据图片素材回复"}
  },
  {
    id:3, cat:"B", catName:"精准人群", duration:"40-55s", title:"宝妈必看：值班室工作到底有多轻松？",
    hook:"很多宝妈问我，有没有一份工作——不用风吹日晒、不用加班、离家近、还稳定？有。",
    script:`【开头 — 痛点切入】
很多宝妈问我，有没有一份工作——
不用风吹日晒、不用加班、离家近、还稳定？

有。消防控制室值班员。

【工作内容揭秘】
这份工作干什么呢？

坐在小区、商场或者写字楼的消防控制室里，
看看监控屏幕，有报警信号就按流程处理。

不需要体力劳动，不用跑外面。

唯一的门槛就是——你得有一个消防设施操作员中级证。

报考条件很简单：18 到 70 岁，高中或中专学历就行。

【我们的优势】
我们的综合通过率 80%，全国平均只有 30%。
按流程学习，两次不过全额退款。

在家用手机就能练题、练实操，
考前 5 天来连云港集训就行。

不耽误你带孩子。

【结尾】
想了解更多？评论区扣"宝妈"，我私信你详细资料。`,
    points:["精准切入宝妈痛点：轻松、稳定、离家近","工作内容揭秘消除未知感","强调不耽误带孩子","引导词：评论扣'宝妈'"],
    shooting:"女性老师出镜更佳，场景可选温馨教室或控制室",
    personnel:"女性老师优先（由甲方安排）",
    publish:{platform:"抖音 + 小红书",time:"工作日 12:00-14:00（宝妈刷手机高峰）",tags:"#宝妈 #重返职场 #消防证 #轻松工作",note:"小红书可做图文版同步发布"}
  },
  {
    id:4, cat:"B", catName:"精准人群", duration:"40-50s", title:"50 岁了还能考消防证吗？能！70 岁以内都行",
    hook:"有人跟我说，我都 50 多了，还能考证吗？我说——你就算 65，都没问题。",
    script:`【开头 — 破除焦虑】
有人跟我说，我都 50 多了，还能考证吗？

我说——你就算 65 岁，都没问题。
消防设施操作员证的报考年龄上限是 70 周岁。

【为什么适合年龄大的人】
而且你想想，消防控制室值班这个岗位——

坐在屋里看屏幕，按流程操作就行。

这不就是为年龄大的朋友量身定做的工作吗？

【学历要求】
学历要求也不高，高中或者中专就够了。

【学习方式】
你可能担心——我年纪大了，学不会怎么办？

我们花 20 万自己研发了一套模拟软件，
在手机上就能练，反复练、不限次数。
考前 5 天来学校面对面集训。

综合通过率 80%。
按流程学，两次不过退全款。

【结尾】
年龄从来不是问题，行动才是。
评论区扣"咨询"，我帮你规划。`,
    points:["破除年龄焦虑：70 岁以内均可","工作性质适合年龄大的人","学习方式友好（手机练习+面对面集训）","通过率 80% + 退款保障消除顾虑"],
    shooting:"口播，可穿插值班室工作场景画面",
    personnel:"营销方向老师（由甲方安排）",
    publish:{platform:"抖音官号",time:"早上 6:00-8:00（中老年刷抖音高峰）",tags:"#50岁考证 #消防证 #中年转型 #值班室",note:"标题和封面突出年龄数字"}
  },
  {
    id:5, cat:"C", catName:"信任建立", duration:"30-45s", title:"冲刺校区实拍：我们教室隔壁就是考场",
    hook:"你见过教室和考场只隔一堵墙的培训学校吗？我带你看。",
    script:`【开头 — 视觉冲击】
你见过教室和考场只隔一堵墙的培训学校吗？

【实拍展示】

（走到窗边/门口，指向隔壁建筑）
看到没？那栋楼就是消防鉴定站——也就是考场。

let currentFilter = {cat:'all', status:'all', search:''};

function renderScripts(){
  const c = document.getElementById('scriptsContainer');
  c.innerHTML = '';
  const states = loadStates();
  let visible = 0;
  SCRIPTS.forEach(s => {
    const st = states[s.id] || {status:'draft',comments:[]};
    // Filter
    if(currentFilter.cat !== 'all' && s.cat !== currentFilter.cat) return;
    if(currentFilter.status !== 'all' && st.status !== currentFilter.status) return;
    if(currentFilter.search){
      const q = currentFilter.search.toLowerCase();
      if(!s.title.toLowerCase().includes(q) && !s.script.toLowerCase().includes(q) && !s.catName.includes(q)) return;
    }
    visible++;

    const catClass = {A:'cat-a',B:'cat-b',C:'cat-c',D:'cat-d',E:'cat-e'}[s.cat]||'cat-a';
    const statusClass = st.status !== 'draft' ? `status-${st.status}` : '';
    const statusTag = {draft:'待审核',approved:'已通过',rejected:'不采用',revised:'需修改'}[st.status]||'待审核';
    const statusTagClass = {draft:'tag-draft',approved:'tag-approved',rejected:'tag-rejected',revised:'tag-revised'}[st.status]||'tag-draft';

    let commentsHtml = '';
    if(st.comments && st.comments.length > 0){
      commentsHtml = '<div class="comment-list">' + st.comments.map((cm,i) => `
        <div class="comment-item">
          <button class="comment-delete" onclick="deleteComment(${s.id},${i})" title="删除">&times;</button>
          <div class="comment-time">${cm.time}</div>
          <div class="comment-text">${escapeHtml(cm.text)}</div>
        </div>
      `).join('') + '</div>';
    }

    c.innerHTML += `
    <div class="script ${statusClass}" id="script-${s.id}" data-cat="${s.cat}" data-status="${st.status}">
      <div class="script-header" onclick="toggleScript(${s.id})">
        <div class="script-left">
          <span class="script-num ${catClass}">${String(s.id).padStart(2,'0')}</span>
          <span class="script-title-text">${s.title}</span>
          <div class="script-tags">
            <span class="tag tag-cat">${s.catName}</span>
            <span class="tag tag-dur">${s.duration}</span>
            <span class="tag tag-status ${statusTagClass}">${statusTag}</span>
          </div>
        </div>
        <span class="script-toggle">&#9660;</span>
      </div>
      <div class="script-body">
        <div class="section-label">拍摄信息</div>
        <div class="meta-grid">
          <div class="meta-item"><strong>时长</strong>${s.duration}</div>
          <div class="meta-item"><strong>拍摄要求</strong>${s.shooting}</div>
          <div class="meta-item"><strong>出镜人员</strong>${s.personnel}</div>
        </div>

        <div class="section-label">开头钩子</div>
        <div class="hook-box">${s.hook}</div>

        <div class="section-label">完整逐字稿</div>
        <div class="script-text">${s.script}</div>

        <div class="section-label">核心表达要点</div>
        <ul class="points-list">${s.points.map(p=>`<li>${p}</li>`).join('')}</ul>

        <div class="section-label">发布信息</div>
        <div class="publish-box">
          <strong>发布平台：</strong>${s.publish.platform}<br>
          <strong>建议时间：</strong>${s.publish.time}<br>
          <strong>推荐标签：</strong>${s.publish.tags}<br>
          <strong>发布备注：</strong>${s.publish.note}
        </div>

        <div class="review-panel no-print">
          <div class="review-title">审核与反馈</div>
          <div class="review-actions">
            <button class="review-btn approve ${st.status==='approved'?'active':''}" onclick="setStatus(${s.id},'approved')">&#10003; 通过</button>
            <button class="review-btn revise ${st.status==='revised'?'active':''}" onclick="setStatus(${s.id},'revised')">&#9998; 需修改</button>
            <button class="review-btn reject ${st.status==='rejected'?'active':''}" onclick="setStatus(${s.id},'rejected')">&#10007; 不采用</button>
          </div>
          <textarea class="comment-area" id="comment-${s.id}" placeholder="输入修改意见或反馈...（按保存后可留下多条评论）"></textarea>
          <button class="btn save-comment" onclick="addComment(${s.id})">保存评论</button>
          ${commentsHtml}
        </div>
      </div>
    </div>`;
  });
  updateDashboard();
}

function toggleScript(id){
  const el = document.getElementById('script-'+id);
  el.classList.toggle('open');
}
function expandAll(){document.querySelectorAll('.script').forEach(s=>s.classList.add('open'))}
function collapseAll(){document.querySelectorAll('.script').forEach(s=>s.classList.remove('open'))}

function loadStates(){
  try{return JSON.parse(localStorage.getItem('nanxiao_scripts_v1'))||{}}catch(e){return{}}
}
function saveStates(states){
  localStorage.setItem('nanxiao_scripts_v1',JSON.stringify(states));
}

function setStatus(id, status){
  const states = loadStates();
  if(!states[id]) states[id]={status:'draft',comments:[]};
  states[id].status = status;
  saveStates(states);
  renderScripts();
  showToast(`脚本 #${String(id).padStart(2,'0')} 已标记为「${({approved:'已通过',rejected:'不采用',revised:'需修改'})[status]}」`);
}

function addComment(id){
  const ta = document.getElementById('comment-'+id);
  const text = ta.value.trim();
  if(!text) return;
  const states = loadStates();
  if(!states[id]) states[id]={status:'draft',comments:[]};
  if(!states[id].comments) states[id].comments=[];
  states[id].comments.push({text, time: new Date().toLocaleString('zh-CN')});
  saveStates(states);
  ta.value='';
  renderScripts();
  document.getElementById('script-'+id).classList.add('open');
  showToast('评论已保存');
}

function deleteComment(id, idx){
  if(!confirm('确认删除这条评论？')) return;
  const states = loadStates();
  if(states[id] && states[id].comments){
    states[id].comments.splice(idx,1);
    saveStates(states);
    renderScripts();
    document.getElementById('script-'+id).classList.add('open');
  }
}

function updateDashboard(){
  const states = loadStates();
  let total=0, approved=0, rejected=0, revised=0, draft=0;
  SCRIPTS.forEach(s=>{
    const el = document.getElementById('script-'+s.id);
    if(!el || el.classList.contains('hidden')) return;
    total++;
    const st = (states[s.id]||{}).status||'draft';
    if(st==='approved') approved++;
    else if(st==='rejected') rejected++;
    else if(st==='revised') revised++;
    else draft++;
  });
  document.getElementById('totalCount').textContent = SCRIPTS.length;
  document.getElementById('approvedCount').textContent = approved;
  document.getElementById('rejectedCount').textContent = rejected;
  document.getElementById('revisedCount').textContent = revised;
  document.getElementById('draftCount').textContent = draft;
}

function filterByCat(cat, btn){
  currentFilter.cat = cat;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderScripts();
}

function filterByStatus(status){
  currentFilter.status = status;
  document.querySelectorAll('.dash-card').forEach(c=>c.classList.remove('active'));
  event.currentTarget.classList.add('active');
  renderScripts();
}

function filterScripts(){
  currentFilter.search = document.getElementById('searchBox').value;
  renderScripts();
}

function exportPDF(){
  expandAll();
  setTimeout(()=>window.print(),300);
}

function exportApproved(){
  const states = loadStates();
  currentFilter = {cat:'all',status:'approved',search:''};
  renderScripts();
  expandAll();
  setTimeout(()=>{
    window.print();
    currentFilter = {cat:'all',status:'all',search:''};
    renderScripts();
  },300);
}

function escapeHtml(str){
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg){
  const t = document.createElement('div');
  t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2500);
}

// Init
renderScripts();
</script>
